<!DOCTYPE html>
<html>

<head>
    <title>Student Profile Card</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #profile-card {
            background-color: blue;
            width: 320px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        #profile-card:hover {
            transform: translateY(-8px);
        }

        .student-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .student-name {
            color: #333;
            font-size: 26px;
        }

        .student-course {
            color: #666;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .profile-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .profile-btn:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

    <div id="profile-card">

        <img src="https://randomfox.ca/images/1.jpg"
             alt="Cute Fox"
             class="student-image">

        <h2 class="student-name">Bhichhu Prasai</h2>

        <p class="student-course">
            Bachelor of Science in Information Technology
        </p>

        <button class="profile-btn">
            View Profile
        </button>

    </div>

</body>

</html>
