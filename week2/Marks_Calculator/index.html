<!DOCTYPE html>
<html>

<head>
    <title>Marks Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        input {
            width: 200px;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Student Marks Calculator</h2>

    <input type="number" id="s1" placeholder="Subject 1"><br><br>
    <input type="number" id="s2" placeholder="Subject 2"><br><br>
    <input type="number" id="s3" placeholder="Subject 3"><br><br>
    <input type="number" id="s4" placeholder="Subject 4"><br><br>
    <input type="number" id="s5" placeholder="Subject 5"><br><br>
    <input type="number" id="s6" placeholder="Subject 6"><br><br>
    <input type="number" id="s7" placeholder="Subject 7"><br><br>
    <input type="number" id="s8" placeholder="Subject 8"><br><br>

    <button onclick="calculate()">Calculate Marks</button>

    <div id="result"></div>

    <script src="script.js"></script>

</body>

</html>
